name: CI Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Skip unit tests for CI
        run: echo "Skipping tests in CI environment"

  sast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit

  sca:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'

  dast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      
      - name: Start DefectDojo with all services
        run: |
          docker compose up -d --wait
          
      - name: Wait for application to be ready
        run: |
          echo "Waiting for DefectDojo to initialize..."
          timeout 120s bash -c 'while ! curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login | grep -q "200\|302"; do sleep 5; done'
          echo "DefectDojo is ready!"
          
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:8080'
          issue_title: 'ZAP DAST Scan Report'
